name: Deploy staging Worker

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
        description: SHA of caller-repo commit to check out and deploy.
      vars-json:
        type: string
        required: true
        description: Staging vars.input.json contents (GLH_STAGING_VARS_JSON).
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      TURBO_TOKEN:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GLH_VARS_JSON: ${{ inputs.vars-json }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: staging
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          submodules: recursive
          ref: ${{ inputs.ref }}

      - name: Reset rendered config so staging vars take effect
        run: rm -f vars.input.json vars.json wrangler.jsonc github-app.md

      - uses: ./.github/actions/init

      - name: Sanity-check rendered Worker name
        run: |
          var_name="$(jq -r '.cloudflare.workerName' vars.json)"
          wrangler_name="$(bun -e 'process.stdout.write((await import("./wrangler.jsonc")).default.name)')"
          if [ "$var_name" != "lfs-server-staging" ] || [ "$wrangler_name" != "lfs-server-staging" ]; then
            echo "::error::expected lfs-server-staging, got vars.json='$var_name' wrangler.jsonc='$wrangler_name' — refusing to deploy"
            exit 1
          fi

      - run: bunx turbo run build --force

      - run: bunx wrangler deploy --minify
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
