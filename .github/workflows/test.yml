name: Staging tests

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
        description: SHA of caller-repo commit to check out.
      vars-json:
        type: string
        required: true
        description: Staging vars.input.json contents (GLH_STAGING_VARS_JSON).
      pr-number:
        type: number
        required: true
      run-id:
        type: number
        required: true
    secrets:
      GH_PAT:
        required: true
        description: Bot PAT — write on git-lfs-hub/test and (org-mode) read:org membership.
      LOGIN_SECRET:
        required: true
        description: Hex matching LOGIN_SECRET on the lfs-server-staging Worker.

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GLH_VARS_JSON: ${{ inputs.vars-json }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: staging

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          submodules: recursive
          ref: ${{ inputs.ref }}

      - name: Reset rendered config
        run: rm -f vars.input.json vars.json wrangler.jsonc github-app.md

      - uses: ./.github/actions/init

      - name: Read staging URLs from vars.json
        id: vars
        run: |
          echo "url=https://$(jq -r '.lfs.server' vars.json)" >> "$GITHUB_OUTPUT"
          echo "title=$(jq -r '.title' vars.json)" >> "$GITHUB_OUTPUT"

      - name: Docs staging test (Tier 2)
        run: ./staging/docs-test.sh
        env:
          STAGING_URL: ${{ steps.vars.outputs.url }}
          DOCS_TITLE: ${{ steps.vars.outputs.title }}
          GH_PAT: ${{ secrets.GH_PAT }}
          LOGIN_SECRET: ${{ secrets.LOGIN_SECRET }}

      - name: Install git-lfs
        run: sudo apt-get update && sudo apt-get install -y git-lfs

      - name: LFS push staging test
        run: ./staging/lfs-push-test.sh
        env:
          LFS_URL: ${{ steps.vars.outputs.url }}/git-lfs-hub/test
          GH_PAT: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ inputs.pr-number }}
          RUN_ID: ${{ inputs.run-id }}
