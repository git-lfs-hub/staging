name: Staging

on:
  workflow_call:
    inputs:
      vars-json:
        type: string
        required: true
        description: |
          Caller's GLH_VARS_JSON (prod vars.input.json contents). The workflow
          derives staging values by appending '-staging' to cloudflare.workerName
          and s3.bucket — no separate staging vars JSON needed.

jobs:
  staging:
    name: Deploy + test
    runs-on: ubuntu-latest
    concurrency:
      group: lfs-server-staging
      cancel-in-progress: false
    env:
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: staging

    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./e2e/.github/actions/init-staging
        with:
          vars-json: ${{ inputs.vars-json }}

      - name: Deploy staging worker
        run: bunx turbo run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Install git-lfs
        run: sudo apt-get update && sudo apt-get install -y git-lfs

      - name: Test staging
        run: bun --bun run staging-test
        working-directory: staging
        env:
          GH_PAT: ${{ secrets.GLH_STAGING_GITHUB_PAT }}
          LOGIN_SECRET: ${{ secrets.GLH_STAGING_LOGIN_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
